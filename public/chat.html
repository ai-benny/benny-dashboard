<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Chat · Benny Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    .chat-layout { display: flex; flex-direction: column; height: calc(100vh - 160px); }
    .chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    .chat-input-bar { display: flex; gap: 10px; padding: 16px; border-top: 1px solid var(--border); }
    .chat-input {
      flex: 1; background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 16px; color: var(--text); font-size: 14px; outline: none; resize: none;
      font-family: inherit; max-height: 120px;
    }
    .chat-input:focus { border-color: var(--accent); }
    .msg { display: flex; gap: 10px; max-width: 85%; }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.benny { align-self: flex-start; }
    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 16px;
    }
    .msg.user .msg-avatar { background: var(--accent); }
    .msg.benny .msg-avatar { background: #1e293b; border: 1px solid var(--border); }
    .msg-bubble {
      padding: 10px 14px; border-radius: 14px; font-size: 14px; line-height: 1.6;
    }
    .msg.user .msg-bubble { background: var(--accent); color: white; border-radius: 14px 4px 14px 14px; }
    .msg.benny .msg-bubble { background: var(--card); border: 1px solid var(--border); border-radius: 4px 14px 14px 14px; }
    .msg.benny .msg-bubble .md-content p { margin: 4px 0; }
    .msg.benny .msg-bubble .md-content code { font-size: 12px; }
    .typing { display: flex; gap: 4px; padding: 4px 0; align-items: center; }
    .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform:translateY(0) } 30% { transform:translateY(-6px) } }
    .quick-btns { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 16px 10px; }
  </style>
</head>
<body>

<nav class="sidebar">
  <div class="sidebar-logo"><div class="title">🧠 Benny</div><div class="sub">OpenClaw Dashboard</div></div>
  <div class="sidebar-nav">
    <a href="/"><span class="icon">🏠</span> Home</a>
    <a href="/crons.html"><span class="icon">⏰</span> Cron Jobs</a>
    <a href="/files.html"><span class="icon">📝</span> Config Files</a>
    <a href="/memory.html"><span class="icon">🧩</span> Memory</a>
    <a href="/notion.html"><span class="icon">📋</span> LinkedIn Planner</a>
    <a href="/kanban.html"><span class="icon">🎯</span> Kanban</a>
    <a href="/logs.html"><span class="icon">📡</span> Live Logs</a>
    <a href="/chat.html" class="active"><span class="icon">💬</span> Agent Chat</a>
    <a href="/github.html"><span class="icon">🐙</span> GitHub</a>
    <a href="/flowcharts.html"><span class="icon">🗺️</span> Flowcharts</a>
  </div>
  <div class="sidebar-footer">v1.1 · localhost:3000</div>
</nav>

<main class="main" style="padding:28px 32px 0;display:flex;flex-direction:column;height:100vh">
  <div class="page-title" style="margin-bottom:4px">💬 Agent Chat</div>
  <div class="page-sub" style="margin-bottom:12px">Snel iets vragen aan Benny — compact, direct.</div>

  <div class="card" style="flex:1;display:flex;flex-direction:column;padding:0;overflow:hidden;margin-bottom:0">
    <div class="chat-messages" id="messages">
      <div class="msg benny">
        <div class="msg-avatar">🧠</div>
        <div class="msg-bubble"><div class="md-content">Hey Bas. Wat wil je weten?</div></div>
      </div>
    </div>

    <div class="quick-btns" id="quick-btns">
      <button class="btn btn-ghost" style="font-size:12px" onclick="quickSend('Geef een overzicht van alle actieve cron jobs')">⏰ Cron overzicht</button>
      <button class="btn btn-ghost" style="font-size:12px" onclick="quickSend('Wat zijn mijn lopende projecten?')">📁 Projecten</button>
      <button class="btn btn-ghost" style="font-size:12px" onclick="quickSend('Geef 3 tips om sneller klanten te vinden voor app development')">💡 Klanten tips</button>
      <button class="btn btn-ghost" style="font-size:12px" onclick="quickSend('Wat moet ik vandaag focussen op?')">🎯 Focus</button>
    </div>

    <div class="chat-input-bar">
      <textarea class="chat-input" id="input" placeholder="Vraag iets aan Benny…" rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn btn-primary" onclick="send()">↑ Send</button>
    </div>
  </div>
</main>

<script>
let history = [];

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function quickSend(msg) {
  document.getElementById('input').value = msg;
  send();
  document.getElementById('quick-btns').style.display = 'none';
}

function appendMsg(role, content, isTyping = false) {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.id = isTyping ? 'typing-indicator' : '';

  const avatar = role === 'user' ? '👤' : '🧠';
  const bubbleContent = isTyping
    ? `<div class="typing"><span></span><span></span><span></span></div>`
    : role === 'benny'
      ? `<div class="md-content">${marked.parse(content)}</div>`
      : content;

  div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-bubble">${bubbleContent}</div>`;
  wrap.appendChild(div);
  wrap.scrollTop = wrap.scrollHeight;
  return div;
}

async function send() {
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg) return;

  input.value = '';
  input.style.height = 'auto';

  appendMsg('user', msg);
  history.push({ role: 'user', content: msg });

  const typingEl = appendMsg('benny', '', true);

  try {
    const r = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, history: history.slice(-10) })
    });
    const d = await r.json();
    typingEl.remove();

    const reply = d.reply || d.error || '❌ Geen antwoord';
    appendMsg('benny', reply);
    history.push({ role: 'assistant', content: reply });
  } catch (err) {
    typingEl.remove();
    appendMsg('benny', `❌ Fout: ${err.message}`);
  }
}
</script>
</body>
</html>
